<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Експертне оцінювання: смаки тортиків</title>
</head>
<body>
    <div class="app-card">
      <nav class="nav-tabs">
          <button id="tab-voting" class="active">🗳️ Голосування</button>
          <button id="tab-admin">🔐 Адмінка</button>
      </nav>
  
      <div id="voting-section">
          <div class="user-badge" id="user-display">Завантаження...</div>
          <h1>Оберіть ваші 3 найулюбленіші смаки тортиків</h1>
          <div id="app"></div>
          <button id="submit-btn" disabled>Оберіть 3 смаки</button>
      </div>

      <div id="password-modal" class="modal-overlay hidden">
        <div class="modal-content">
          <h3>🔐 Доступ до адмін-панелі</h3>
          <p>Будь ласка, введіть пароль адміністратора</p>
          
          <input type="password" id="admin-pass-input" placeholder="Пароль..." />
          
          <p id="modal-error-text" style="color: #d63031; font-size: 0.9em; margin-top: 5px; min-height: 1.2em;"></p>
          
          <div class="modal-actions">
            <button id="modal-cancel">Скасувати</button>
            <button id="modal-confirm">Увійти</button>
          </div>
        </div>
      </div>
  
      <div id="admin-section" class="hidden">
          <h2>📜 Протокол дій експертів</h2>
          <div class="table-card">
              <div class="table-wrapper">
                  <table>
                      <thead>
                          <tr>
                              <th>Експерт</th>
                              <th>Вибір (1-3 місця)</th>
                              <th>Дата та час</th>
                          </tr>
                      </thead>
                      <tbody id="admin-tbody"></tbody>
                  </table>
              </div>
          </div>
      </div>
  </div>
    <div id="app"></div>


    <div id="toast-container"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
