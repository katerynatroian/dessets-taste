<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Експертне оцінювання: смаки тортиків</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-card">
      <nav class="nav-tabs">
          <button id="tab-voting" class="active">🗳️ Голосування</button>
          <button id="tab-admin">🔐 Адмінка</button>
      </nav>
  
      <div id="voting-section">
          <div class="user-badge" id="user-display">Завантаження...</div>
          <h1>Оберіть ваші 3 найулюбленіші смаки тортиків</h1>
          <div id="app"></div>
          <button id="submit-btn" disabled>Оберіть 3 смаки</button>
      </div>
  
      <div id="admin-section" class="hidden">
          <h2>📜 Протокол дій експертів</h2>
          <div class="table-card">
              <div class="table-wrapper">
                  <table>
                      <thead>
                          <tr>
                              <th>Експерт</th>
                              <th>Вибір (1-3 місця)</th>
                              <th>Дата та час</th>
                          </tr>
                      </thead>
                      <tbody id="admin-tbody"></tbody>
                  </table>
              </div>
          </div>
          <div class="admin-ga-card">
              <button id="calc-ranking">
              Застосувати генетичний алгоритм
              </button>
          
              <div id="ga-result"></div>
          
              <div class="chart-container">
                <canvas id="fitnessChart"></canvas>
              </div>
          </div>
      </div>
  </div>
    <div id="app"></div>


    <div id="toast-container"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
